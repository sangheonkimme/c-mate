services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: c-mate-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cmate1234
      MYSQL_DATABASE: c_mate
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pcmate1234",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - c-mate-network

  # Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: c-mate-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: cmate1234
      DB_NAME: c_mate
    volumes:
      - ./backend/src/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - c-mate-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:4000
    container_name: c-mate-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - c-mate-network

volumes:
  db_data:

networks:
  c-mate-network:
    driver: bridge
